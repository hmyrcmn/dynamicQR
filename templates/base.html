<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}YEE | Dinamik QR Sistemi{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .mesh-gradient {
            background-color: #08111a;
            background-image:
                radial-gradient(at 0% 0%, hsla(210, 100%, 12%, 1) 0, transparent 50%),
                radial-gradient(at 50% 0%, hsla(180, 100%, 8%, 1) 0, transparent 50%),
                radial-gradient(at 100% 0%, hsla(190, 100%, 12%, 1) 0, transparent 50%);
            background-attachment: fixed;
        }

        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 10px 40px 0 rgba(0, 0, 0, 0.5);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-primary {
            background: linear-gradient(135deg, #0ea5e9 0%, #0d9488 100%);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 24px -8px rgba(14, 165, 233, 0.5);
        }

        .animate-subtle-float {
            animation: subtleFloat 6s ease-in-out infinite;
        }

        @keyframes subtleFloat {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-10px);
            }
        }
    </style>
</head>

<body class="mesh-gradient min-h-screen text-slate-200 flex flex-col">
    <!-- Kurumsal Navigasyon -->
    <header class="w-full z-50 border-b border-white/5 bg-[#08111a]/80 backdrop-blur-md">
        <div class="max-w-7xl mx-auto flex justify-between items-center px-6 py-4">
            <div class="flex items-center space-x-4">
                <div
                    class="w-10 h-10 bg-gradient-to-br from-cyan-500 to-teal-600 rounded-xl flex items-center justify-center shadow-lg">
                    <span class="font-bold text-white text-xl">YEE</span>
                </div>
                <div>
                    <h1 class="text-lg font-bold tracking-tight text-white leading-none">Yunus Emre Enstitüsü</h1>
                    <p class="text-[10px] uppercase tracking-widest text-cyan-500 font-semibold mt-1">Dinamik QR Servisi
                    </p>
                </div>
            </div>
            <nav class="hidden md:flex items-center space-x-8">
                <a href="https://yee.org.tr" target="_blank"
                    class="text-sm font-medium hover:text-cyan-400 transition-colors">Enstitü</a>
                <a href="/admin/"
                    class="text-sm font-semibold bg-white/5 hover:bg-white/10 px-5 py-2 rounded-lg border border-white/10 transition-all">
                    Personel Girişi
                </a>
            </nav>
        </div>
    </header>

    <!-- Ana İçerik Alanı -->
    <main class="flex-grow flex items-center justify-center py-12 px-6">
        {% block content %}{% endblock %}
    </main>

    <!-- Kurumsal Footer -->
    <footer class="w-full border-t border-white/5 bg-[#040a0f]/90 py-10 mt-auto">
        <div class="max-w-7xl mx-auto px-6">
            <div class="flex flex-col md:flex-row justify-between items-center space-y-4 md:space-y-0">
                <div class="text-center md:text-left">
                    <p class="text-sm text-gray-400">&copy; 2026 Yunus Emre Enstitüsü. Tüm hakları saklıdır.</p>
                </div>
                <div class="hidden md:block">
                    <p class="text-xs font-medium tracking-wide text-gray-500 italic">
                        "Türkiye'nin Sesini Dünyaya Taşıyan Dijital Köprü"
                    </p>
                </div>
                <div class="flex space-x-6 text-gray-500">
                    <span class="text-xs uppercase tracking-tighter">Güvenli Yönlendirme</span>
                    <span class="text-xs uppercase tracking-tighter">KVKK Uyumlu</span>
                </div>
            </div>
        </div>
    </footer>
</body>

</html>
