<!DOCTYPE html>
<html lang="tr" class="h-full">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Yunus Emre Enstitüsü | Dinamik QR{% endblock %}</title>
    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Premium Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --brand-navy: #0f172a;
            /* Slate 900 */
            --brand-teal: #0f766e;
            /* Teal 700 */
            --brand-cyan: #0369a1;
            /* Sky 700 */
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #020617;
            /* Slate 950 */
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* High-End Liquid Mesh Background */
        .page-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background:
                radial-gradient(ellipse at 0% 0%, rgba(13, 148, 136, 0.4) 0, transparent 50%),
                radial-gradient(ellipse at 100% 0%, rgba(14, 165, 233, 0.3) 0, transparent 50%),
                radial-gradient(ellipse at 100% 100%, rgba(15, 23, 42, 1) 0, transparent 50%),
                radial-gradient(ellipse at 0% 100%, rgba(3, 105, 161, 0.4) 0, transparent 50%);
            background-color: #020617;
            filter: blur(60px);
            opacity: 0.9;
            animation: liquid-pulse 25s ease-in-out infinite alternate;
        }

        @keyframes liquid-pulse {
            0% {
                transform: scale(1) translate(0, 0);
            }

            50% {
                transform: scale(1.05) translate(2%, 2%);
            }

            100% {
                transform: scale(1) translate(-2%, -1%);
            }
        }

        /* Premium Liquid Glass Card */
        .glass-card {
            background: rgba(15, 23, 42, 0.4);
            /* Slate 900 with high transparency */
            backdrop-filter: blur(48px) saturate(200%);
            -webkit-backdrop-filter: blur(48px) saturate(200%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            /* Frosted edge */
            box-shadow:
                0 4px 24px -1px rgba(0, 0, 0, 0.2),
                0 0 0 1px rgba(255, 255, 255, 0.02) inset;
        }

        /* Fluid Gradient Borders */
        .glass-border-gradient {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.1) 0%, rgba(255, 255, 255, 0.02) 50%, rgba(255, 255, 255, 0.05) 100%);
        }

        /* Apple Aesthetic Button */
        .btn-primary {
            background: linear-gradient(135deg, rgba(14, 165, 233, 0.9) 0%, rgba(13, 148, 136, 0.9) 100%);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
            position: relative;
            overflow: hidden;
            box-shadow: 0 8px 16px -4px rgba(13, 148, 136, 0.3);
        }

        .btn-primary:before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(to right, transparent, rgba(255, 255, 255, 0.2), transparent);
            transform: skewX(-20deg);
            transition: 0.5s;
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 12px 20px -4px rgba(13, 148, 136, 0.4);
            filter: brightness(1.1);
        }

        .btn-primary:hover:before {
            left: 150%;
        }

        .btn-primary:active {
            transform: translateY(1px);
            box-shadow: 0 4px 8px -2px rgba(13, 148, 136, 0.3);
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: #020617;
        }

        ::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #475569;
        }
    </style>
</head>

<body class="flex flex-col h-full text-slate-300">
    <div class="page-background"></div>

    <!-- Liquid Header -->
    <header class="flex-none z-50 border-b border-white/5 bg-slate-950/40 backdrop-blur-xl">
        <div class="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">
            <div class="flex items-center space-x-3">
                <div
                    class="w-8 h-8 rounded-[0.7rem] bg-gradient-to-br from-cyan-500 to-teal-600 flex items-center justify-center shadow-lg border border-white/10">
                    <span class="text-white font-bold text-lg">Y</span>
                </div>
                <div class="flex flex-col leading-none">
                    <span class="text-white font-bold text-sm tracking-tight uppercase">Yunus Emre Enstitüsü</span>
                    <span class="text-cyan-400 text-[10px] font-black tracking-widest uppercase mt-0.5">Dinamik QR
                        Servisi</span>
                </div>
            </div>

            <!-- Removed unnecessary navigation links, keeping only User controls if needed (or just admin login if completely blank is requested, but user needs to login/logout. Keeping minimum) -->
            <nav class="hidden md:flex items-center space-x-6">
                {% if user.is_authenticated %}
                <a href="{% url 'custom_logout' %}"
                    class="text-xs font-semibold text-rose-400 hover:text-rose-300 transition-colors uppercase tracking-widest">Çıkış
                    Yap</a>
                {% else %}
                <a href="/admin/"
                    class="px-4 py-1.5 border border-white/10 rounded-full text-[10px] font-bold uppercase tracking-widest hover:bg-white/5 transition-all text-white">Kurumsal
                    Giriş</a>
                {% endif %}
            </nav>
        </div>
    </header>

    <!-- Main Viewport Context -->
    <main class="flex-grow flex items-center justify-center overflow-x-hidden py-4 z-10 relative">
        {% block content %}{% endblock %}
    </main>

    <!-- Clean Footer -->
    <footer class="flex-none py-6 border-t border-white/5 bg-slate-950/20 backdrop-blur-lg">
        <div class="max-w-7xl mx-auto px-6 flex items-center justify-center">
            <p class="text-[10px] font-medium text-slate-500 uppercase tracking-widest text-center">
                &copy; 2024 Yunus Emre Enstitüsü - Kurumsal Bilgi İşlem
            </p>
        </div>
    </footer>
</body>

</html>
