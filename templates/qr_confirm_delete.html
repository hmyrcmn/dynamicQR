{% extends "base.html" %}

{% block title %}YEE | QR Kod Sil{% endblock %}

{% block content %}
<div class="max-w-md w-full px-6 py-12 animate-in fade-in zoom-in-95 duration-500">
    <div
        class="glass-card rounded-[3rem] p-10 md:p-12 shadow-2xl relative overflow-hidden group border border-rose-500/20">
        <!-- Ambient Liquid Glow -->
        <div
            class="absolute inset-0 bg-gradient-to-tr from-rose-500/10 to-red-600/5 opacity-100 transition-opacity duration-700 pointer-events-none">
        </div>

        <div class="relative z-10 text-center">

            <div
                class="inline-flex items-center justify-center w-24 h-24 bg-gradient-to-br from-rose-500/20 to-red-600/20 rounded-full shadow-[0_0_40px_rgba(244,63,94,0.15)] mb-8 border-4 border-rose-500/30 backdrop-blur-xl group-hover:scale-105 transition-transform duration-500">
                <svg class="w-10 h-10 text-rose-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z">
                    </path>
                </svg>
            </div>

            <h2 class="text-3xl font-black text-white tracking-tight mb-3">Emin misiniz?</h2>

            <p class="text-slate-300 text-sm leading-relaxed mb-6 font-medium">
                <strong class="text-white bg-white/10 px-2 py-0.5 rounded">{{ qr_code.title }}</strong> başlıklı
                yönlendirmeyi silmek üzeresiniz.
            </p>

            <div
                class="bg-rose-950/40 backdrop-blur-md border border-rose-500/30 rounded-[1.5rem] p-5 mb-8 text-left flex items-start space-x-4 shadow-inner">
                <div
                    class="w-8 h-8 rounded-full bg-rose-500/20 flex items-center justify-center shrink-0 border border-rose-500/30 mt-0.5">
                    <svg class="w-4 h-4 text-rose-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                    </svg>
                </div>
                <div>
                    <p class="text-sm font-bold text-rose-300 mb-1">Dikkat: Geri Alınamaz</p>
                    <p class="text-xs font-medium text-rose-400/80 leading-relaxed">
                        Bu QR kod (<span
                            class="font-mono text-white bg-rose-500/20 px-1.5 py-0.5 rounded border border-rose-500/30">{{
                            qr_code.short_id }}</span>) artık çalışmayacaktır.
                    </p>
                </div>
            </div>

            <form method="post" class="space-y-4">
                {% csrf_token %}

                <button type="submit"
                    class="w-full bg-gradient-to-r from-rose-500 to-red-600 outline-none border border-rose-400/50 text-white font-black py-5 rounded-2xl shadow-[0_8px_16px_-4px_rgba(244,63,94,0.3)] text-lg tracking-tight transition-all hover:scale-[1.02] active:scale-[0.98] hover:shadow-[0_12px_20px_-4px_rgba(244,63,94,0.4)]">
                    Kalıcı Olarak Sil
                </button>

                <a href="{% url 'dashboard' %}"
                    class="block w-full bg-white/5 hover:bg-white/10 text-slate-300 hover:text-white font-bold py-4 rounded-2xl transition-all text-xs uppercase tracking-widest border border-white/10 backdrop-blur-md shadow-lg hover:shadow-xl">
                    Vazgeç
                </a>
            </form>

        </div>
    </div>
</div>
{% endblock %}
