{% load i18n static %}
<!DOCTYPE html>
<html lang="tr" class="h-full" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YEE | Oturum Kapatıldı</title>
    <meta name="theme-color" content="#edf4f4" id="theme-color-meta">
    <link rel="icon" type="image/png" href="{% static 'img/yee-favicon.png' %}">
    <link rel="apple-touch-icon" href="{% static 'img/yee-favicon.png' %}">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <script>
        (function () {
            const storageKey = 'dynamicqr-theme';
            const root = document.documentElement;
            const savedTheme = localStorage.getItem(storageKey);
            const systemTheme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
            const theme = savedTheme === 'dark' || savedTheme === 'light' ? savedTheme : systemTheme;
            root.dataset.theme = theme;
            root.style.colorScheme = theme;
        })();
    </script>
    <style>
        :root {
            --page-bg-start: #edf4f4;
            --page-bg-end: #f8fbfb;
            --glass-card-bg: rgba(255, 255, 255, 0.74);
            --glass-card-border: rgba(255, 255, 255, 0.84);
            --glass-card-shadow: 0 24px 70px rgba(16, 32, 42, 0.1), inset 0 1px 0 rgba(255, 255, 255, 0.82);
            --toggle-bg: rgba(255, 255, 255, 0.72);
            --toggle-border: rgba(16, 32, 42, 0.08);
            --toggle-color: #10202a;
        }

        html[data-theme="dark"] {
            --page-bg-start: #071316;
            --page-bg-end: #0a191d;
            --glass-card-bg: rgba(9, 23, 28, 0.8);
            --glass-card-border: rgba(255, 255, 255, 0.08);
            --glass-card-shadow: 0 30px 90px rgba(0, 0, 0, 0.38), inset 0 1px 0 rgba(255, 255, 255, 0.05);
            --toggle-bg: rgba(9, 23, 28, 0.82);
            --toggle-border: rgba(255, 255, 255, 0.08);
            --toggle-color: #e7f3f4;
        }

        body {
            font-family: 'Manrope', sans-serif;
            background: linear-gradient(180deg, var(--page-bg-start) 0%, var(--page-bg-end) 100%);
            color: #10202a;
            -webkit-font-smoothing: antialiased;
        }

        .page-background {
            position: fixed;
            inset: 0;
            overflow: hidden;
            pointer-events: none;
            z-index: -1;
        }

        .page-background::before,
        .page-background::after {
            content: "";
            position: absolute;
            border-radius: 999px;
            filter: blur(90px);
        }

        .page-background::before {
            width: 24rem;
            height: 24rem;
            top: -7rem;
            left: -6rem;
            background: rgba(90, 218, 221, 0.26);
        }

        .page-background::after {
            width: 20rem;
            height: 20rem;
            right: -4rem;
            bottom: -5rem;
            background: rgba(18, 188, 200, 0.14);
        }

        .glass-card {
            background: var(--glass-card-bg);
            backdrop-filter: blur(30px) saturate(180%);
            -webkit-backdrop-filter: blur(30px) saturate(180%);
            border: 1px solid var(--glass-card-border);
            box-shadow: var(--glass-card-shadow);
        }

        .theme-toggle {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            border-radius: 999px;
            border: 1px solid var(--toggle-border);
            background: var(--toggle-bg);
            color: var(--toggle-color);
            padding: 0.75rem 0.95rem;
            font-size: 0.82rem;
            font-weight: 700;
            transition: transform 160ms ease, background-color 160ms ease;
        }

        .theme-toggle:hover {
            transform: translateY(-1px);
        }

        .theme-toggle svg {
            width: 1rem;
            height: 1rem;
        }

        .logo-plinth {
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        html[data-theme="dark"] .text-slate-900 {
            color: #f4fbfb !important;
        }

        html[data-theme="dark"] .text-slate-700 {
            color: #d7e4e7 !important;
        }

        html[data-theme="dark"] .text-slate-600 {
            color: #b5c7cb !important;
        }

        html[data-theme="dark"] .text-slate-400 {
            color: #86a0a5 !important;
        }

        html[data-theme="dark"] .border-slate-200 {
            border-color: rgba(255, 255, 255, 0.08) !important;
        }

        html[data-theme="dark"] .bg-white\/70 {
            background-color: rgba(10, 22, 27, 0.74) !important;
        }
    </style>
    <meta http-equiv="refresh" content="3;url=/">
</head>

<body class="min-h-full">
    <div class="page-background"></div>

    <main class="flex min-h-full items-center justify-center p-4 md:p-6">
        <div class="w-full max-w-xl text-center">
            <div class="mb-3 flex justify-end md:mb-4">
                <button type="button" class="theme-toggle" data-theme-toggle aria-label="Temayı değiştir">
                    <svg data-theme-icon="light" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M12 3v2m0 14v2m7-9h2M3 12H5m12.364 6.364 1.414 1.414M5.222 5.222l1.414 1.414m0 10.728-1.414 1.414m12.728-12.728-1.414 1.414M12 16a4 4 0 100-8 4 4 0 000 8z">
                        </path>
                    </svg>
                    <svg data-theme-icon="dark" class="hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M20.354 15.354A9 9 0 018.646 3.646 9 9 0 1012 21a8.96 8.96 0 008.354-5.646z">
                        </path>
                    </svg>
                    <span data-theme-label class="hidden md:inline">Koyu tema</span>
                </button>
            </div>
            <div class="glass-card overflow-hidden rounded-[2.25rem] p-6 md:p-8">
                <div class="logo-plinth mx-auto px-4 py-3">
                    <img src="{% static 'img/yee-logo.png' %}" alt="Yunus Emre Enstitüsü logosu"
                        class="h-10 w-auto object-contain md:h-12">
                </div>

                <div class="mx-auto mt-6 flex h-16 w-16 items-center justify-center rounded-full border border-emerald-200 bg-emerald-50 text-emerald-600 shadow-inner">
                    <svg class="h-8 w-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
                    </svg>
                </div>

                <h1 class="mt-6 text-2xl font-extrabold tracking-tight text-slate-900 md:text-3xl">Oturumunuz kapatıldı</h1>
                <p class="mx-auto mt-3 max-w-lg text-sm leading-7 text-slate-600 md:text-[15px]">
                    Güvenli şekilde çıkış yaptınız. Ana sayfaya yönlendiriliyorsunuz. Dilerseniz hemen yeniden giriş de yapabilirsiniz.
                </p>

                <div class="mt-6 flex flex-col gap-3 sm:flex-row sm:justify-center">
                    <a href="/"
                        class="inline-flex items-center justify-center rounded-full bg-gradient-to-r from-[#12bcc8] to-[#0ea5b2] px-6 py-3 text-sm font-bold text-white shadow-[0_18px_34px_rgba(18,188,200,0.26)] transition hover:-translate-y-0.5 hover:brightness-105">
                        Ana sayfaya dön
                    </a>
                    <a href="/admin/login/"
                        class="inline-flex items-center justify-center rounded-full border border-slate-200 bg-white/70 px-6 py-3 text-sm font-bold text-slate-700 transition hover:bg-white">
                        Tekrar giriş yap
                    </a>
                </div>

                <p class="mt-6 text-[11px] font-extrabold uppercase tracking-[0.22em] text-slate-400">
                    3 saniye içinde otomatik yönlendirme
                </p>
            </div>
        </div>
    </main>
    <script>
        const themeStorageKey = 'dynamicqr-theme';

        function applyTheme(theme) {
            const root = document.documentElement;
            const themeColorMeta = document.getElementById('theme-color-meta');
            root.dataset.theme = theme;
            root.style.colorScheme = theme;

            if (themeColorMeta) {
                themeColorMeta.setAttribute('content', theme === 'dark' ? '#071316' : '#edf4f4');
            }

            document.querySelectorAll('[data-theme-toggle]').forEach((button) => {
                const label = button.querySelector('[data-theme-label]');
                const lightIcon = button.querySelector('[data-theme-icon="light"]');
                const darkIcon = button.querySelector('[data-theme-icon="dark"]');

                button.setAttribute('aria-pressed', theme === 'dark' ? 'true' : 'false');

                if (label) {
                    label.textContent = theme === 'dark' ? 'Açık tema' : 'Koyu tema';
                }

                if (lightIcon) {
                    lightIcon.classList.toggle('hidden', theme === 'dark');
                }

                if (darkIcon) {
                    darkIcon.classList.toggle('hidden', theme !== 'dark');
                }
            });
        }

        function toggleTheme() {
            const currentTheme = document.documentElement.dataset.theme === 'dark' ? 'dark' : 'light';
            const nextTheme = currentTheme === 'dark' ? 'light' : 'dark';
            localStorage.setItem(themeStorageKey, nextTheme);
            applyTheme(nextTheme);
        }

        document.addEventListener('DOMContentLoaded', () => {
            applyTheme(document.documentElement.dataset.theme === 'dark' ? 'dark' : 'light');
            document.querySelectorAll('[data-theme-toggle]').forEach((button) => {
                button.addEventListener('click', toggleTheme);
            });
        });
    </script>
</body>

</html>
