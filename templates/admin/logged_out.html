{% load i18n %}
<!DOCTYPE html>
<html lang="tr" class="h-full">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YEE | Oturum Kapatıldı</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #020617;
            -webkit-font-smoothing: antialiased;
        }

        .page-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background:
                radial-gradient(ellipse at 0% 0%, rgba(13, 148, 136, 0.4) 0, transparent 50%),
                radial-gradient(ellipse at 100% 0%, rgba(14, 165, 233, 0.3) 0, transparent 50%),
                radial-gradient(ellipse at 100% 100%, rgba(15, 23, 42, 1) 0, transparent 50%),
                radial-gradient(ellipse at 0% 100%, rgba(3, 105, 161, 0.4) 0, transparent 50%);
            background-color: #020617;
            filter: blur(60px);
            opacity: 0.9;
        }

        .glass-card {
            background: rgba(15, 23, 42, 0.4);
            backdrop-filter: blur(48px) saturate(200%);
            -webkit-backdrop-filter: blur(48px) saturate(200%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 4px 24px -1px rgba(0, 0, 0, 0.2);
        }
    </style>
    <meta http-equiv="refresh" content="3;url=/">
</head>

<body class="flex flex-col h-full text-slate-300">
    <div class="page-background"></div>

    <main class="flex-grow flex items-center justify-center p-6 z-10 relative">
        <div class="max-w-md w-full text-center">
            <div class="glass-card rounded-[3rem] p-12 relative overflow-hidden">
                <div
                    class="inline-flex items-center justify-center w-20 h-20 bg-gradient-to-br from-teal-500/20 to-cyan-500/20 rounded-full shadow-xl mb-8 border border-teal-500/30">
                    <svg class="w-10 h-10 text-teal-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
                    </svg>
                </div>

                <h1 class="text-2xl font-black text-white tracking-tight mb-3">Oturumunuz Kapatıldı</h1>
                <p class="text-slate-400 text-sm leading-relaxed mb-8">
                    Güvenli bir şekilde çıkış yaptınız. Ana sayfaya yönlendiriliyorsunuz...
                </p>

                <a href="/"
                    class="inline-flex items-center px-6 py-3 bg-gradient-to-r from-cyan-500/90 to-teal-600/90 text-white font-bold rounded-2xl text-sm tracking-tight shadow-lg hover:shadow-xl transition-all border border-white/15">
                    Ana Sayfaya Dön
                </a>

                <div class="mt-8">
                    <a href="/admin/login/"
                        class="text-xs text-slate-500 hover:text-cyan-400 font-bold uppercase tracking-widest transition-colors">
                        Tekrar Giriş Yap &rarr;
                    </a>
                </div>
            </div>
        </div>
    </main>
</body>

</html>
